name: Publish Packages

on:
  workflow_dispatch:

concurrency: version-or-publish-${{ github.ref }}

jobs:
  publish:
    name: Publish Packages
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # To get all tags
          ref: ${{ github.ref }}
      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          node-version: '24'
          cache: 'false'
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0
      - name: Check for new packages
        id: check-packages
        run: |
          pkg="$(node -p "require('./package.json').name")"
          npm_stderr_file="$RUNNER_TEMP/npm-view.stderr"
          if npm view "$pkg" version > /dev/null 2> "$npm_stderr_file"; then
            echo "All packages exist on npm — using OIDC trusted publishing"
            echo "has_new_packages=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm_error="$(tr '\n' ' ' < "$npm_stderr_file")"
          if [[ "$npm_error" == *"E404"* || "$npm_error" == *"404"* || "$npm_error" == *"Not Found"* ]]; then
            echo "::notice::New package detected ($pkg) — will use NPM token for publish"
            echo "has_new_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::npm view failed for $pkg: ${npm_error:-Unknown error}"
            exit 1
          fi
      - name: Configure npm auth
        run: |
          if [ "$HAS_NEW_PACKAGES" = "true" ]; then
            # New packages aren't registered for OIDC trusted publishing yet, so
            # authenticate with the npm token. setup-node's .npmrc reads it from
            # NODE_AUTH_TOKEN.
            echo "NODE_AUTH_TOKEN=${NPM_TOKEN}" >> "$GITHUB_ENV"
          else
            # Existing packages publish via OIDC trusted publishing. npm only
            # falls through to OIDC when no _authToken is configured, so strip the
            # line setup-node wrote to the npm userconfig. Removing it is enough:
            # nothing downstream then reads NODE_AUTH_TOKEN.
            if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
              sed -i '/_authToken=/d' "$NPM_CONFIG_USERCONFIG"
            fi
          fi
        env:
          HAS_NEW_PACKAGES: ${{ steps.check-packages.outputs.has_new_packages }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create Prepare Release PR or Publish
        id: changesets
        uses: changesets/action@001cd79f0a536e733315164543a727bdf2d70aff # v1.5.1
        with:
          title: Prepare Release
          commit: Prepare Release
          version: npm run version-package
          publish: npm run publish-package
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      - name: Check changesets status
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          echo "Changesets found. Merge Prepare Release PR before publishing."
          exit 1
      - name: Check publish status
        if: steps.changesets.outputs.published == 'false'
        run: |
          echo "Publish failed. Check the logs for more details."
          exit 1
      - name: Publish to Soldeer
        if: steps.changesets.outputs.published == 'true'
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          echo "Publishing version $PACKAGE_VERSION to Soldeer..."
          forge soldeer push openzeppelin-foundry-upgrades~$PACKAGE_VERSION
        shell: bash
        env:
          SOLDEER_API_TOKEN: ${{ secrets.SOLDEER_API_TOKEN }}
